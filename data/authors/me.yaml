  - role: Signal Processing Research Engineer
    org: Innovative Signal Analysis, Inc.
    start: 2014-11-01
    end: 2017-01-31
    summary: |
      Research and development of radar signal processing algorithms for
      operational systems, with a focus on practical implementation and reliable
      detection performance.
      • In first month of employment, found critical bugs related to underlying statistical 
        assumptions and behavior in the real-time signal-detector/characterizer and, for a 
        particular input parameter setting, reduced the number of false-alarms by two orders of magnitude.
      • Designed and implemented (in C) a) solutions to detect and characterize radar pulse-compression
        codes (result: 50% reduction in missed-detections); b) Hough transform-based detection of
        overlapping chirp signals; c) robust statistical smoothing and outlier removal in C++, and
        supported integration into operational systems.
