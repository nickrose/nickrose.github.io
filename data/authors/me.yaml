    start: 2018-05-01
    end: 2019-01-31
    summary: |
      Signal processing for software-defined radios. Developed methods for
      TDOA estimation and tracking of emmitters from multiple local receivers.
  - role: Senior Data Scientist
    org: Alchemy IoT
    start: 2017-02-01
    end: 2018-08-31
    summary: |
      Developed and implemented algorithms for anomaly detection, predictive
      maintenance, and sensor fusion for industrial IoT applications.
      Led analytics research and development and defined new analytics products,
      including time-series anomaly detection, pattern identification, real-time
      data cleaning, device performance optimization, and infrastructure cost
      estimation tools. 
      • Directed Python prototyping and algorithm integration within AWS/Docker, MongoDB, MQTT, and backend APIs. 
      • Delivered predictive models with a 0.4% false-alarm rate (AUC of 0.92) on noisy, inconsistent data from 100k devices with 70 sensors. 
      • Developed algorithmic improvements using numpy, scipy, and scikit-learn.
      • Granted patents related to the developed algorithms 
    button:
