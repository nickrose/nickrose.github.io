bio: |
  I focus on development and application of statistical signal processing and
  machine learning algorithms for a variety of applications. In particular, I
  am interested in the theoretical under-pinnings and hidden behaviors of ML
  algorithms and what can be understood better about them in terms of
  classical statistics. I also love problem solving and working on challenging
  practical problems, whether it is algorithm development or developing applications 
  that are useful for the customer.

