    summary: |
      Developing advanced analytics approaches for fraud detection, collections enforcement,
      and audit selection. I create insights from customer data to improve compliance and
      workflow efficiency, deploy and monitor multiple mixed data-type models for fraud scoring
      with accuracy above 93% for UI claims, and retuned an existing fraud model to achieve
      98% accuracy with an AUC of 0.99 for tax returns. I also formulated a unique
      semi-supervised audit selection model that achieved 94% accuracy, and my areas of
      practice include NLP (embeddings, LLMs, and RAG chatbots), recommendation engines, supervised
      data ETL (cleaning, feature engineering, and model tuning), and unsupervised approaches
      such as clustering and anomaly detection.
  - role: Adjunct Professor
