    summary: |
      Designing, developing, and improving mathematical models and practical 
      implementations of target-tracking and computational-sensing
      algorithms (with the result that the required SNR for detection was halved), 
      game-theoretic resource allocation and guidance planning (dynamic and 
      adversarial assumptions), and spatial filtering of intermittent low-dimensional 
      measurements for tracking accuracy and uncertainty quantification; also responsible 
      for integrating these algorithms into operational and benchmark systems.
  - role: Senior Data Scientist
    org: Formulus Black
    start: 2018-08-01
    end: 2019-05-31
    summary: |
      Developed novel algorithmic improvements to hashing, deduplication, load balancing, 
      and VM migration systems. Achieved 300% efficiency gains in data reduction algorithms 
      and optimized hash table performance in C for faster retrieval and reduced CPU contention. 
      Applied machine learning techniques for predictive caching and streaming compression, 
      while devising a convex relaxation to solve the NP-hard VM-to-resource assignment problem. 
      Prototyped and tested all solutions using Python with numpy, scipy, scikit-learn, and 
      related libraries.
  - role: Signal Processing Consultant
